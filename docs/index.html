<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Restaurant Noise Levels</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .stats {
      color: #888;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .stats span { 
      display: inline-block;
      margin-right: 1.5rem;
    }
    .filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #555; color: #fff; }
    .filter-btn.active { background: #2a2a2a; border-color: #666; color: #fff; }
    .search {
      padding: 0.6rem 1rem;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      border-radius: 6px;
      font-size: 0.85rem;
      width: 220px;
    }
    .search:focus { outline: none; border-color: #555; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #444; }
    .card-name {
      font-weight: 500;
      color: #fff;
      margin-bottom: 0.4rem;
      font-size: 1rem;
    }
    .card-name a {
      color: inherit;
      text-decoration: none;
    }
    .card-name a:hover { text-decoration: underline; }
    .card-alias {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 0.6rem;
      word-break: break-all;
    }
    .noise-badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .noise-quiet { background: #1a3a1a; color: #6fcf6f; }
    .noise-moderate_noise { background: #3a3a1a; color: #cfcf6f; }
    .noise-average { background: #3a3a1a; color: #cfcf6f; }
    .noise-loud { background: #3a2a1a; color: #cf9f6f; }
    .noise-very_loud { background: #3a1a1a; color: #cf6f6f; }
    .noise-none { background: #2a2a2a; color: #666; }
    .noise-error { background: #2a1a1a; color: #aa5555; }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>SF Restaurant Noise Levels</h1>
  <div class="stats" id="stats"></div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="quiet">Quiet</button>
    <button class="filter-btn" data-filter="moderate_noise">Moderate</button>
    <button class="filter-btn" data-filter="loud">Loud</button>
    <button class="filter-btn" data-filter="very_loud">Very Loud</button>
    <button class="filter-btn" data-filter="none">No Data</button>
    <input type="text" class="search" id="search" placeholder="Search restaurants...">
  </div>
  
  <div class="grid" id="grid"></div>

  <script>
    let data = [];
    let filter = 'all';
    let search = '';

    async function loadData() {
      const resp = await fetch('./sf_loudness.csv');
      const text = await resp.text();
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      
      data = lines.slice(1).map(line => {
        // Handle CSV with empty fields properly
        const values = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        values.push(current);
        
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = values[i] || '';
        });
        return obj;
      }).filter(d => d.alias);
      
      updateStats();
      render();
    }

    function updateStats() {
      const total = data.length;
      const withNoise = data.filter(d => d.noise_level && !d.error).length;
      const quiet = data.filter(d => d.noise_level === 'quiet').length;
      const moderate = data.filter(d => d.noise_level === 'moderate_noise' || d.noise_level === 'average').length;
      const loud = data.filter(d => d.noise_level === 'loud').length;
      const veryLoud = data.filter(d => d.noise_level === 'very_loud').length;
      const errors = data.filter(d => d.error).length;
      
      document.getElementById('stats').innerHTML = `
        <span><strong>${total}</strong> restaurants</span>
        <span><strong>${withNoise}</strong> with noise data (${Math.round(withNoise/total*100)}%)</span>
        <span>🤫 ${quiet} quiet</span>
        <span>🔉 ${moderate} moderate</span>
        <span>🔊 ${loud} loud</span>
        <span>📢 ${veryLoud} very loud</span>
        ${errors ? `<span>⚠️ ${errors} errors</span>` : ''}
      `;
    }

    function render() {
      const grid = document.getElementById('grid');
      
      let filtered = data;
      
      if (filter === 'none') {
        filtered = filtered.filter(d => !d.noise_level && !d.error);
      } else if (filter !== 'all') {
        filtered = filtered.filter(d => d.noise_level === filter || (filter === 'moderate_noise' && d.noise_level === 'average'));
      }
      
      if (search) {
        const q = search.toLowerCase();
        filtered = filtered.filter(d => 
          (d.name || '').toLowerCase().includes(q) || 
          d.alias.toLowerCase().includes(q)
        );
      }
      
      // Sort: with noise first, then alphabetically
      filtered.sort((a, b) => {
        if (a.noise_level && !b.noise_level) return -1;
        if (!a.noise_level && b.noise_level) return 1;
        return (a.name || a.alias).localeCompare(b.name || b.alias);
      });
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No restaurants match your filters</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(d => {
        // Check if alias is a hash (no hyphens except possibly at edges, 15+ chars)
        const isHash = d.alias.length >= 15 && d.alias.split('-').length <= 2;
        const name = d.name || (isHash ? 'Unknown Restaurant' : d.alias.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()));
        const noiseClass = d.error ? 'error' : (d.noise_level || 'none');
        const noiseLabel = d.error ? 'Error' : (d.noise_level?.replace('_', ' ') || 'No data');
        const previewUrl = `https://www.yelp.com/biz/${d.alias}?hrid=preview`;
        const displayAlias = isHash ? `<a href="${previewUrl}" target="_blank">View on Yelp →</a>` : d.alias;
        
        return `
          <div class="card">
            <div class="card-name"><a href="${previewUrl}" target="_blank">${name}</a></div>
            <div class="card-alias">${displayAlias}</div>
            <span class="noise-badge noise-${noiseClass}">${noiseLabel}</span>
          </div>
        `;
      }).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', e => {
      search = e.target.value;
      render();
    });

    loadData();
  </script>
</body>
</html>
