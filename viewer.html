<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soft tables</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fefefe;
      color: #2a2a2a;
      min-height: 100vh;
      font-weight: 300;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      margin-bottom: 0.75rem;
      color: #2a2a2a;
    }
    
    .subtitle {
      color: #999;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      font-weight: 300;
    }
    
    .filters {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin: 2rem 0 1rem;
    }
    
    .filter-btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid #e8e8e8;
      background: transparent;
      color: #999;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: all 0.2s;
    }
    
    .filter-btn:hover {
      border-color: #ccc;
      color: #666;
    }
    
    .filter-btn.active {
      border-color: #8b9d83;
      color: #8b9d83;
      background: rgba(139, 157, 131, 0.05);
    }
    
    .filter-btn.noise-quiet { color: #7cb380; }
    .filter-btn.noise-moderate { color: #d4b84a; }
    .filter-btn.noise-loud { color: #cf8b5a; }
    .filter-btn.noise-very-loud { color: #c46b6b; }
    
    .filter-btn.noise-quiet.active { border-color: #7cb380; background: rgba(124, 179, 128, 0.1); }
    .filter-btn.noise-moderate.active { border-color: #d4b84a; background: rgba(212, 184, 74, 0.1); }
    .filter-btn.noise-loud.active { border-color: #cf8b5a; background: rgba(207, 139, 90, 0.1); }
    .filter-btn.noise-very-loud.active { border-color: #c46b6b; background: rgba(196, 107, 107, 0.1); }
    
    .filter-btn.price-btn { color: #7a9a6a; }
    .filter-btn.price-btn.active { border-color: #7a9a6a; color: #7a9a6a; background: rgba(122, 154, 106, 0.1); }
    
    .filter-btn.rating-btn { color: #b8a040; }
    .filter-btn.rating-btn.active { border-color: #b8a040; color: #b8a040; background: rgba(184, 160, 64, 0.1); }
    
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .filter-label {
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.05em;
      width: 3rem;
      text-align: right;
      margin-right: 0.3rem;
    }
    
    .search-wrap {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0;
    }
    
    .search {
      width: 100%;
      max-width: 280px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e8e8e8;
      background: transparent;
      border-radius: 2px;
      font-size: 0.8rem;
      font-weight: 300;
      color: #2a2a2a;
      letter-spacing: 0.02em;
    }
    
    .search:focus {
      outline: none;
      border-color: #ccc;
    }
    
    .search::placeholder {
      color: #bbb;
    }
    
    .count {
      text-align: center;
      color: #bbb;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: #e8e8e8;
      border: 1px solid #e8e8e8;
    }
    
    .item {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0.9rem 0.8rem;
      padding-left: 1rem;
      background: #fefefe;
      text-decoration: none;
      color: inherit;
      min-height: 70px;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    
    .item:hover {
      background: #fafafa;
    }
    
    .item.level-quiet { border-left-color: #7cb380; }
    .item.level-moderate { border-left-color: #d4b84a; }
    .item.level-loud { border-left-color: #cf8b5a; }
    .item.level-very-loud { border-left-color: #c46b6b; }
    .item.level-unknown { border-left-color: #ccc; }
    
    .item-name {
      font-size: 0.8rem;
      font-weight: 400;
      color: #2a2a2a;
      line-height: 1.3;
      letter-spacing: 0.01em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    
    .item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: #999;
    }
    
    .item-dots {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }
    
    .item-details {
      display: flex;
      gap: 0.5rem;
      color: #aaa;
    }
    
    .item-price {
      color: #7a9a6a;
    }
    
    .item-rating {
      color: #b8a040;
    }
    
    .item.level-quiet .item-dots { color: #7cb380; }
    .item.level-moderate .item-dots { color: #d4b84a; }
    .item.level-loud .item-dots { color: #cf8b5a; }
    .item.level-very-loud .item-dots { color: #c46b6b; }
    .item.level-unknown .item-dots { color: #bbb; }
    
    .legend {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.05em;
    }
    
    .legend span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .legend i {
      font-style: normal;
      font-size: 0.85rem;
    }
    
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #ccc;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      background: #fefefe;
    }
    
    footer {
      text-align: center;
      margin-top: 3rem;
      color: #ccc;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    
    footer a {
      color: #aaa;
      text-decoration: none;
    }
    
    footer a:hover {
      color: #888;
    }
    
    @media (max-width: 600px) {
      .container { padding: 1.5rem 1rem; }
      h1 { font-size: 1.25rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>soft tables</h1>
      <p class="subtitle">san francisco restaurants where you can hear yourself think</p>
    </header>
    
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">noise</span>
        <button class="filter-btn active" data-filter="all">any</button>
        <button class="filter-btn noise-quiet" data-filter="quiet">▁</button>
        <button class="filter-btn noise-moderate" data-filter="moderate_noise">▁▃</button>
        <button class="filter-btn noise-loud" data-filter="loud">▁▃▅</button>
        <button class="filter-btn noise-very-loud" data-filter="very_loud">▁▃▅▇</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">price</span>
        <button class="filter-btn active" data-price="">any</button>
        <button class="filter-btn price-btn" data-price="$">$</button>
        <button class="filter-btn price-btn" data-price="$$">$$</button>
        <button class="filter-btn price-btn" data-price="$$$">$$$</button>
        <button class="filter-btn price-btn" data-price="$$$$">$$$$</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">rating</span>
        <button class="filter-btn active" data-rating="">any</button>
        <button class="filter-btn rating-btn" data-rating="3">3+</button>
        <button class="filter-btn rating-btn" data-rating="3.5">3.5+</button>
        <button class="filter-btn rating-btn" data-rating="4">4+</button>
        <button class="filter-btn rating-btn" data-rating="4.5">4.5+</button>
      </div>
    </div>
    
    <div class="search-wrap">
      <input type="text" class="search" id="search" placeholder="search">
    </div>
    
    <div class="legend">
      <span><i style="color:#7cb380">▁</i> quiet · easy conversation</span>
      <span><i style="color:#d4b84a">▁▃</i> moderate · comfortable</span>
      <span><i style="color:#cf8b5a">▁▃▅</i> loud · raise your voice</span>
      <span><i style="color:#c46b6b">▁▃▅▇</i> very loud · difficult to talk</span>
    </div>
    
    <div class="count" id="count"></div>
    
    <div class="grid" id="grid"></div>
    
    <footer>
      data from yelp · <a href="https://github.com/rllin/loudness" target="_blank">source</a>
    </footer>
  </div>

  <script>
    let data = [];
    let filter = 'all';
    let search = '';
    let priceFilter = '';
    let ratingFilter = '';
    
    const dots = {
      quiet: '▁',
      moderate_noise: '▁▃',
      average: '▁▃',
      loud: '▁▃▅',
      very_loud: '▁▃▅▇',
      unknown: '?'
    };
    
    async function loadData() {
      const resp = await fetch('sf_loudness.csv');
      const text = await resp.text();
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      
      data = lines.slice(1).map(line => {
        const values = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        values.push(current);
        
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = values[i] || '';
        });
        return obj;
      }).filter(d => d.alias && !d.error);
      
      render();
    }
    
    function render() {
      const grid = document.getElementById('grid');
      
      let filtered = data;
      
      if (filter !== 'all') {
        if (filter === 'moderate_noise') {
          filtered = filtered.filter(d => d.noise_level === 'moderate_noise' || d.noise_level === 'average');
        } else {
          filtered = filtered.filter(d => d.noise_level === filter);
        }
      }
      
      if (search) {
        const q = search.toLowerCase();
        filtered = filtered.filter(d => 
          (d.name || '').toLowerCase().includes(q) || 
          d.alias.toLowerCase().includes(q)
        );
      }
      
      if (priceFilter) {
        filtered = filtered.filter(d => d.price === priceFilter);
      }
      
      if (ratingFilter) {
        const minRating = parseFloat(ratingFilter);
        filtered = filtered.filter(d => d.rating && parseFloat(d.rating) >= minRating);
      }
      
      // Sort: rating (high→low), price (expensive→cheap), noise (quiet→loud, unknown last), alpha
      const noiseOrder = { quiet: 0, moderate_noise: 1, average: 1, loud: 2, very_loud: 3 };
      const priceOrder = { '$$$$': 0, '$$$': 1, '$$': 2, '$': 3, '-': 4, '': 5 };
      filtered.sort((a, b) => {
        // Rating: highest first
        const ratingA = parseFloat(a.rating) || 0;
        const ratingB = parseFloat(b.rating) || 0;
        if (ratingB !== ratingA) return ratingB - ratingA;
        // Price: most expensive first
        const priceA = priceOrder[a.price] ?? 5;
        const priceB = priceOrder[b.price] ?? 5;
        if (priceA !== priceB) return priceA - priceB;
        // Noise: quietest first, unknown (no noise_level) last
        const noiseA = noiseOrder[a.noise_level] ?? 99;
        const noiseB = noiseOrder[b.noise_level] ?? 99;
        if (noiseA !== noiseB) return noiseA - noiseB;
        // Alphabetical
        return (a.name || a.alias).localeCompare(b.name || b.alias);
      });
      
      document.getElementById('count').textContent = filtered.length + ' places';
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">no results</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(d => {
        const name = d.name || d.alias.replace(/-/g, ' ');
        const dot = dots[d.noise_level] || dots.unknown;
        const yelpUrl = `https://www.yelp.com/biz/${d.alias}`;
        const levelClass = d.noise_level === 'quiet' ? 'quiet' :
                          d.noise_level === 'very_loud' ? 'very-loud' :
                          d.noise_level === 'loud' ? 'loud' :
                          d.noise_level ? 'moderate' : 'unknown';
        const price = d.price || '';
        const rating = d.rating ? `★${d.rating}` : '';
        
        return `
          <a class="item level-${levelClass}" href="${yelpUrl}" target="_blank">
            <div class="item-name">${name}</div>
            <div class="item-meta">
              <span class="item-dots">${dot}</span>
              <span class="item-details">
                ${price ? `<span class="item-price">${price}</span>` : ''}
                ${rating ? `<span class="item-rating">${rating}</span>` : ''}
              </span>
            </div>
          </a>
        `;
      }).join('');
    }
    
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });
    
    document.querySelectorAll('[data-price]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-price]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        priceFilter = btn.dataset.price;
        render();
      });
    });
    
    document.querySelectorAll('[data-rating]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-rating]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ratingFilter = btn.dataset.rating;
        render();
      });
    });
    
    document.getElementById('search').addEventListener('input', e => {
      search = e.target.value;
      render();
    });
    
    loadData();
  </script>
</body>
</html>
